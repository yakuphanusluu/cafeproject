<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="login_title">Giriş Yap - Cyber Coffee</title>
    <style>
        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background-color: #f4f1ea; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; }
        
        .top-bar { width: 100%; max-width: 400px; display: flex; justify-content: flex-end; margin-bottom: 20px; }
        .lang-select { padding: 8px 12px; border-radius: 8px; border: 1px solid #ddd; background: white; cursor: pointer; font-weight: bold; color: #5c4033; }
        
        .auth-container { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 5px 25px rgba(0,0,0,0.1); width: 100%; max-width: 400px; text-align: center; }
        h2 { color: #5c4033; margin-top: 0; font-size: 1.8em; }
        
        input { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; }
        button { width: 100%; padding: 14px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; font-size: 1.1em; transition: 0.3s; margin-bottom: 10px; }
        
        .btn-main { background-color: #1abc9c; color: white; }
        .btn-main:hover { background-color: #16a085; }
        
        .toggle-link { color: #3498db; cursor: pointer; text-decoration: underline; font-size: 0.95em; font-weight: bold; }
        .back-link { display: block; margin-top: 25px; color: #888; text-decoration: none; font-size: 0.9em; font-weight: bold; }
    </style>
</head>
<body>

    <div class="top-bar">
        <select id="language-select" class="lang-select" onchange="changeLanguage(this.value)">
            <option value="tr">🇹🇷 TR</option>
            <option value="en">🇺🇸 EN</option>
        </select>
    </div>

    <div class="auth-container">
        <h2 id="form-title" data-i18n="login_title">Giriş Yap</h2>
        <input type="text" id="username" data-i18n="username_ph" placeholder="Kullanıcı Adı">
        <input type="password" id="password" data-i18n="password_ph" placeholder="Şifre">
        
        <button class="btn-main" id="submit-btn" onclick="handleAuth()" data-i18n="btn_login">Giriş Yap</button>
        <p class="toggle-link" onclick="toggleForm()" id="toggle-text" data-i18n="toggle_register">Hesabın yok mu? Kayıt Ol</p>
        
        <a href="index.html" class="back-link" data-i18n="back_home">⬅ Ana Sayfaya Dön</a>
    </div>

    <script src="script.js?v=9.5"></script>
    <script>
        let isLogin = true;

        function toggleForm() {
            isLogin = !isLogin;
            const title = document.getElementById("form-title");
            const btn = document.getElementById("submit-btn");
            const toggle = document.getElementById("toggle-text");

            // Duruma göre anahtarları (key) değiştiriyoruz
            if (isLogin) {
                title.setAttribute("data-i18n", "login_title");
                btn.setAttribute("data-i18n", "btn_login");
                toggle.setAttribute("data-i18n", "toggle_register");
            } else {
                title.setAttribute("data-i18n", "register_title");
                btn.setAttribute("data-i18n", "btn_register");
                toggle.setAttribute("data-i18n", "toggle_login");
            }
            
            // Değişiklik sonrası çeviriyi anında uygula ki ekrana yansısın
            const lang = localStorage.getItem("selectedLang") || "tr";
            changeLanguage(lang);
        }

        async function handleAuth() {
            const user = document.getElementById("username").value.trim();
            const pass = document.getElementById("password").value.trim();
            if(!user || !pass) return alert(t('alert_empty'));

            const endpoint = isLogin ? "/Customer/login" : "/Customer/register";
            const btn = document.getElementById("submit-btn");
            btn.disabled = true;
            btn.innerText = t('btn_sending');
            
            try {
                const res = await fetch(API_URL + endpoint, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: user, password: pass })
                });
                
                if(res.ok) {
                    const data = await res.json();
                    localStorage.setItem("cyberUser", JSON.stringify(data));
                    window.location.href = "index.html"; // Başarılıysa ana sayfaya yolla
                } else {
                    alert(isLogin ? t('login_err') : t('reg_err'));
                }
            } catch(e) {
                alert("Bağlantı hatası / Connection error");
            } finally {
                btn.disabled = false;
                changeLanguage(localStorage.getItem("selectedLang") || "tr"); // Buton ismini geri getir
            }
        }
    </script>
</body>
</html>
